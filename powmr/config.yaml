name: PowMr Inverter
version: "0.1.16"
slug: powmr
description: Poll a PowMr inverter over AIRcable's MiniP5 (https://aircable.co) TCP and publish Home Assistant MQTT discovery entities.
url: https://github.com/aircable/PowMrAddon
arch:
  - amd64
  - aarch64
build_from:
  amd64: ghcr.io/home-assistant/amd64-base:3.22
  aarch64: ghcr.io/home-assistant/aarch64-base:3.22
startup: services
boot: auto
init: false
host_network: true
services:
  - mqtt:want
options:
  inverter_host: airminip5_6d94.local
  inverter_port: 3333
  poll_interval_seconds: 5
  stale_link_seconds: 120
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: powmr
  device_name: PowMr Inverter
  device_id: powmr_inverter
  safe_output_source_priority: solar_utility_battery
  debug_logging: false
schema:
  inverter_host: str
  inverter_port: port
  poll_interval_seconds: int(2,)
  stale_link_seconds: int(30,)
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str
  device_name: str
  device_id: str
  safe_output_source_priority: list(utility_solar_battery|solar_utility_battery|solar_battery_utility)
  debug_logging: bool
